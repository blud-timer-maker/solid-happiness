<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
</head>
<body>
    <h1>Countdown Timer</h1>
    <div id="timer"></div>
    <div id="milestones"></div>
    <script>
        const startDate = new Date('2026-01-31T17:43:00Z');
        const timerDiv = document.getElementById('timer');
        const milestonesDiv = document.getElementById('milestones');

        function updateTimer() {
            const now = new Date();
            const timeDiff = Math.floor((now - startDate) / (1000 * 60 * 60 * 24)); // Difference in days
            timerDiv.innerHTML = `Days on the road to Ziddianthe blud rot: ${timeDiff}`;
            checkMilestones(timeDiff);
        }

        function checkMilestones(days) {
            milestonesDiv.innerHTML = '';
            if (days % 50 === 0) {
                milestonesDiv.innerHTML += `<p>🎉 Milestone: ${days} days! 🎉</p>`;
            }
            if (String(days).endsWith('67')) {
                milestonesDiv.innerHTML += `<p>🎊 Celebration: ${days} days ends in 67! 🎊</p>`;
            }
            if (days % 365 === 0) {
                milestonesDiv.innerHTML += `<p>🎂 Happy Anniversary: ${days / 365} year(s)! 🎂</p>`;
            }
        }

        setInterval(updateTimer, 1000 * 60 * 60 * 24); // Update once a day
        updateTimer(); // Initial call
    </script>
</body>
</html>
