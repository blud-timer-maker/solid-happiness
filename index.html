<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blud Timer</title>
    <style>
        body {
            background-color: blue;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        #timer {
            font-size: 48px;
        }
        .confetti {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            background-image: url('confetti.png'); /* Replace with your confetti image */
            background-size: cover;
        }
    </style>
</head>
<body>
    <h1>Days on the road to Ziddianthe blud rot</h1>
    <div id="timer"></div>
    <div class="confetti" id="confetti"></div>

    <script>
        const milestoneDays = (days) => {
            return days % 50 === 0 || days.toString().endsWith('67') || (days % 365 === 0);
        };

        const updateTimer = () => {
            const startDate = new Date('2026-01-01T00:00:00Z'); // Change to your start date
            const now = new Date();
            const elapsedTime = now - startDate;

            const totalSeconds = Math.floor(elapsedTime / 1000);
            const days = Math.floor(totalSeconds / (3600 * 24));
            const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            document.getElementById('timer').innerText = `${days} Days ${hours} Hours ${minutes} Minutes ${seconds} Seconds`;

            if (milestoneDays(days)) {
                document.getElementById('confetti').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('confetti').style.display = 'none';
                }, 5000);
            }
        };

        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
