<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f0f0f0; }
        #timer { font-size: 48px; color: #333; text-align: center; }
        .confetti { position: absolute; width: 10px; height: 10px; background: #ffc700; 
            animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <div id="timer"></div>
    <script>
        const milestones = [50, 67, 100, 150, 200, 250, 300, 350, 400, 450, 500, 600, 700, 800, 900, 1000];
        const startDate = new Date('2026-01-31T17:43:00Z');
        const timerElement = document.getElementById('timer');

        function updateTimer() {
            const now = new Date();
            const diff = Math.floor((now - startDate) / 1000);
            const days = Math.floor(diff / (3600 * 24));
            const hours = Math.floor((diff % (3600 * 24)) / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;
            timerElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            if (milestones.includes(days)) {
                createConfettiEffect();
            }
        }

        function createConfettiEffect() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            document.body.appendChild(confetti);
            setTimeout(() => {
                confetti.remove();
            }, 3000);
        }

        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
