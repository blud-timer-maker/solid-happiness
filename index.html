<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <style>
        body {
            background-color: blue;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        #timer {
            font-size: 48px;
        }
    </style>
</head>
<body>
    <h1>Days on the road to Ziddianthe blud rot</h1>
    <div id="timer"></div>

    <script>
        const startDate = new Date("2026-01-31T17:43:00Z");
        const milestoneDays = [50, 67];

        function updateTimer() {
            const now = new Date();
            const timeDiff = now - startDate;
            const totalSeconds = Math.floor(timeDiff / 1000);

            const days = Math.floor(totalSeconds / (3600 * 24));
            const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            document.getElementById('timer').innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            // Check milestones for confetti
            if (days % 50 === 0 || String(days).endsWith('67') || (now.getUTCDate() === 31 && now.getUTCMonth() === 0)) {
                triggerConfetti();
            }
        }

        function triggerConfetti() {
            // Confetti animation code here
            console.log("Confetti! 🎉");
        }

        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
